server:
  port: 8081

spring:
  application:
    name: AUTH-SERVICE

  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: postgres
    password: your_password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

instance:
    prefer-ip-address: false
    hostname: localhost

jwt:
  secret: mySuperSecretKeyForJwtAuthentication123456789
  expiration: 86400000